<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #ffffff !important; color: #111111 !important; font-family: 'Noto Sans JP', sans-serif; font-size: 15px; line-height: 1.6; overflow-x: hidden; }

  /* HEADER — index.html と同一 */
  header { background: #0f1f38; padding: 0; display: flex; align-items: stretch; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #c8a830; }
  .logo-wrap { display: flex; flex-direction: column; justify-content: center; padding: 10px 24px; cursor: pointer; text-decoration: none; }
  .logo-en { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #ffffff; line-height: 1; display: flex; align-items: center; gap: 1px; }
  .logo-en span { letter-spacing: 8px; margin-right: -8px; }
  .logo-mark { height: 2em; width: auto; display: block; }
  .logo-ja { font-family: 'Noto Serif JP', serif; font-size: 9px; color: #c8a830; letter-spacing: 4px; margin-top: 3px; font-weight: 400; }

  /* BREADCRUMB */
  .breadcrumb { background: #fff; border-bottom: 1px solid #f0f0f0; padding: 10px 24px; font-size: 11px; color: #bbb; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .breadcrumb a { color: #0f1f38; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb-sep { color: #ddd; }
  .breadcrumb-current { color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }

  /* BACK BAR */
  .back-bar { background: #ffffff; border-bottom: 2px solid #e0e0e0; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
  .back-btn { background: none; border: 1px solid #0f1f38; color: #0f1f38; font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 2px; padding: 5px 14px; cursor: pointer; transition: all 0.15s; }
  .back-btn:hover { background: #0f1f38; color: #fff; }
  .back-bar-label { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 3px; color: #ccc; }

  /* HERO IMAGE */
  .article-hero-img { width: 100%; max-height: 360px; object-fit: contain; display: block; background: #0f1f38; }
  @media (min-width: 768px) {
    .article-hero-img { max-height: 520px; }
  }
  .article-hero-placeholder { width: 100%; height: 260px; background: linear-gradient(135deg, #0f1f38 0%, #1c3060 100%); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: rgba(255,255,255,0.08); letter-spacing: 6px; }

  /* ARTICLE BODY */
  .article-wrap { padding: 36px 24px 60px; max-width: 700px; margin: 0 auto; }
  .article-meta-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .article-cat { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #0f1f38; font-weight: 700; }
  .article-meta-sep { color: #ddd; }
  .article-date { font-size: 11px; color: #999; }
  .article-readtime { font-size: 11px; color: #bbb; }
  .article-source-name { font-size: 11px; color: #aaa; }
  .article-title { font-family: 'Noto Serif JP', serif; font-size: 26px; font-weight: 900; line-height: 1.7; color: #111111; margin-bottom: 20px; }
  @media (min-width: 768px) {
    .article-title { font-size: 34px; }
  }
  .article-divider { height: 2px; background: #0f1f38; margin-bottom: 28px; }
  .article-text { font-size: 17px; line-height: 2.0; color: #333; margin-bottom: 32px; white-space: pre-wrap; }
  .article-hashtags { font-size: 13px; color: #3a6bc4; line-height: 2; margin-bottom: 28px; }
  .article-hashtags a { color: inherit; text-decoration: none; }
  .article-hashtags a:hover { text-decoration: underline; }
  .article-source-block { border-top: 1px solid #e0e0e0; padding-top: 20px; }
  .article-source-label { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2px; color: #aaa; margin-bottom: 8px; }
  .article-via-links { font-size: 13px; display: flex; flex-wrap: wrap; gap: 12px; }
  .article-via-links a { color: #0f1f38; text-decoration: none; font-weight: 700; border-bottom: 1px solid #0f1f38; padding-bottom: 1px; }
  .article-via-links a:hover { color: #c8a830; border-color: #c8a830; }

  /* SHARE BUTTONS */
  .share-row { display: flex; gap: 10px; margin-bottom: 28px; flex-wrap: wrap; }
  .share-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; font-size: 12px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 2px; cursor: pointer; text-decoration: none; border: 1px solid; transition: all 0.15s; line-height: 1; }
  .share-btn-x    { color: #111111; border-color: #111111; }
  .share-btn-x:hover { background: #111111; color: #ffffff; }
  .share-btn-line { color: #06c755; border-color: #06c755; }
  .share-btn-line:hover { background: #06c755; color: #ffffff; }

  /* ERROR / LOADING */
  .article-status { padding: 60px 24px; text-align: center; color: #aaa; font-size: 14px; }

  /* AD SLOT */
  .ad-slot { background: #f9f9f9; border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; padding: 16px 24px; text-align: center; }
  .ad-inner { display: inline-flex; width: 100%; max-width: 728px; height: 90px; background: #f0f0f0; align-items: center; justify-content: center; margin: 0 auto; }
  .ad-inner span { font-size: 11px; color: #bbb; letter-spacing: 2px; }

  /* RELATED ARTICLES */
  .sec-label { padding: 26px 24px 18px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid #e0e0e0; }
  .sec-label span { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 4px; color: #111111; white-space: nowrap; }
  .sec-label::after { content: ''; flex: 1; height: 3px; background: #111111; }
  .news-item { background: #ffffff; padding: 22px 24px; cursor: pointer; display: flex; gap: 16px; align-items: flex-start; transition: background 0.15s; position: relative; }
  .news-item::after { content: ''; position: absolute; bottom: 0; left: 10%; right: 10%; height: 1px; background: #e0e0e0; }
  .news-item:hover { background: #f9f9f7; }
  .news-thumb-placeholder { flex-shrink: 0; width: 90px; height: 60px; background: linear-gradient(135deg, #0f1f38, #1c3060); }
  .news-content { flex: 1; min-width: 0; }
  .news-cat { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #0f1f38; font-weight: 700; margin-bottom: 3px; }
  .news-title { font-family: 'Noto Serif JP', serif; font-size: 14px; font-weight: 700; line-height: 1.5; color: #111111; margin-bottom: 5px; }
  .news-meta { font-size: 10px; color: #999; }
  #relatedSection { margin-top: 20px; }
  @media (min-width: 768px) {
    .related-grid { display: grid; grid-template-columns: 1fr 1fr; }
  }

  /* ARTICLE NAVIGATION (prev / next) */
  .article-nav { display: flex; justify-content: space-between; gap: 12px; border-top: 1px solid #e0e0e0; padding-top: 20px; margin-top: 28px; }
  .article-nav-link { flex: 1; min-width: 0; text-decoration: none; color: #111; padding: 14px 16px; transition: background 0.15s; }
  .article-nav-link:hover { background: #f9f9f7; }
  .article-nav-link.nav-next { text-align: right; }
  .article-nav-dir { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 2px; color: #c8a830; margin-bottom: 6px; }
  .article-nav-title { font-family: 'Noto Serif JP', serif; font-size: 13px; line-height: 1.5; color: #111; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .article-nav-spacer { flex: 1; }

  /* BACK TO TOP */
  .back-to-top { position: fixed; bottom: 28px; right: 24px; width: 44px; height: 44px; background: #0f1f38; border: none; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 50; opacity: 0; transition: opacity 0.25s; }
  .back-to-top.visible { display: flex; opacity: 1; }
  .back-to-top:hover { opacity: 0.75; }

  /* PAGE WRAP */
  .page-wrap { max-width: 1200px; margin: 0 auto; }

  /* FOOTER — index.html と同一 */
  footer { background: #0f1f38; border-top: 2px solid #c8a830; }
  .footer-inner { padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: flex-end; }
</style>
</head>

<div style="background:#ffffff;min-height:100vh;">

      <div style="font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;">© 2026 THE WATCHER</div>
    </div>
  </div>

<!-- BACK TO TOP -->
<button class="back-to-top" id="backToTop" onclick="scrollToTop()" aria-label="ページトップへ">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 4L4 12h5v8h6v-8h5L12 4z"/>
  </svg>

<script>
  function goBack() {
    if (window.history.length > 1) {
      history.back();
    } else {
      location.href = './';
    }
  }

  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // 画像プロキシ（ホットリンク保護回避 + WebP変換）
  function proxyImg(url, w) {
    if (!url) return '';
    if (url.indexOf('wsrv.nl') !== -1) return url;
    return 'https://wsrv.nl/?url=' + encodeURIComponent(url) + '&w=' + (w || 640) + '&output=webp';
  }

  // 画像フォールバック: ①wsrv.nl失敗 → ②元URL → ③プレースホルダー
  function imgError(el, orig, phClass) {
    if (el.src !== orig) {
      el.onerror = function() { imgError(el, orig, phClass); };
      el.src = orig;
    } else if (phClass) {
      var d = document.createElement('div');
      d.className = phClass;
      el.parentNode.replaceChild(d, el);
    } else {
      el.parentNode.removeChild(el);
    }
  }

  function imgOrPH(url, imgStyle, phClass) {
    if (url) {
      return '<img src="' + esc(proxyImg(url)) + '" data-orig="' + esc(url) + '" style="' + imgStyle + '" ' +
        'onerror="imgError(this,this.dataset.orig,\'' + phClass + '\')" alt="">';
    }
    return '<div class="' + phClass + '"></div>';
  }

  // ハッシュタグ文字列 → クリッカブルリンク（tag.html へ）
  function buildHashtagLinks(hashtags) {
    var tags = (hashtags || '').split(/\s+/).filter(function(t) { return t.startsWith('#'); });
    if (!tags.length) return esc(hashtags || '');
    return tags.map(function(t) {
      return '<a href="tag.html?tag=' + encodeURIComponent(t) + '">' + esc(t) + '</a>';
    }).join(' ');
  }

  function openRelated(id) {
    location.href = '/articles/' + encodeURIComponent(id) + '.html';
  }

  // ISO日付 → "2026年4月12日 12:19" (JST = UTC+9)
  function fmtDateJa(iso) {
    if (!iso) return '';
    try {
      var jst = new Date(new Date(iso).getTime() + 9 * 60 * 60 * 1000);
      return jst.getUTCFullYear() + '年' +
        (jst.getUTCMonth() + 1) + '月' +
        jst.getUTCDate() + '日 ' +
        String(jst.getUTCHours()).padStart(2, '0') + ':' +
        String(jst.getUTCMinutes()).padStart(2, '0');
    } catch(e) { return ''; }
  }

  // 本文の文字数から読了時間を計算（日本語：500字/分）
  function calcReadTime(text) {
    var len = (text || '').replace(/\s/g, '').length;
    return Math.max(1, Math.ceil(len / 500));
  }

  // OGP メタタグを動的に更新
  // ※ X・LINEのBotはJSを実行しないため、シェア時のOGPは
  //   <head>内の静的デフォルト値が適用されます（SSR未対応のため）
  function updateOGP(title, description, imageUrl, pageUrl) {
    document.title = title + ' — THE WATCHER';
    var set = function(sel, val) {
      var el = document.querySelector(sel);
      if (el) el.setAttribute('content', val || '');
    };
    set('meta[name="description"]',       description);
    set('meta[property="og:title"]',      title);
    set('meta[property="og:description"]', description);
    set('meta[property="og:image"]',      imageUrl);
    set('meta[property="og:url"]',        pageUrl);
    set('meta[name="twitter:title"]',     title);
    set('meta[name="twitter:description"]', description);
    set('meta[name="twitter:image"]',     imageUrl);
  }

  // パンくずリストを描画
  function renderBreadcrumb(category, title) {
    document.getElementById('breadcrumb').innerHTML =
      '<a href="./">ホーム</a>' +
      '<span class="breadcrumb-sep">›</span>' +
      '<a href="category.html?cat=' + encodeURIComponent(category) + '">' + esc(category) + '</a>' +
      '<span class="breadcrumb-sep">›</span>' +
      '<span class="breadcrumb-current">' + esc(title) + '</span>';
  }

  // シェアボタン HTML を生成
  function buildShareButtons(title, pageUrl) {
    var xHref   = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(title + ' — THE WATCHER') + '&url=' + encodeURIComponent(pageUrl);
    var lineHref = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(pageUrl);
    return '<div class="share-row">' +
      '<a class="share-btn share-btn-x" href="' + esc(xHref) + '" target="_blank" rel="noopener">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.736-8.851L2.25 2.25h6.861l4.258 5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' +
        'POST' +
      '</a>' +
      '<a class="share-btn share-btn-line" href="' + esc(lineHref) + '" target="_blank" rel="noopener">' +
        '<svg width="13" height="13" viewBox="0 0 512 512" fill="currentColor"><path d="M256 48C141 48 48 124.5 48 219c0 70.5 47.5 131.7 118.4 163.4-5.2 19.4-18.8 70.5-21.6 81.5-.3 1.3.5 2.6 1.8 2.9.7.2 1.4 0 2-.5 2.7-2 99.1-65.7 111.1-73.7C267.3 394.4 275.5 396 284 396c-5.3-1.2-10.5-2.3 0 0h-28c115 0 208-76.5 208-171S371 48 256 48z"/></svg>' +
        'LINE' +
      '</a>' +
    '</div>';
  }

  // ページトップへスムーズスクロール
  function scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // スクロール200px超でボタン表示
  window.addEventListener('scroll', function() {
    var btn = document.getElementById('backToTop');
    if (window.scrollY > 200) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  }, { passive: true });

  async function init() {
    // id の取得優先順位:
    //   ① window.__ARTICLE_ID (build時に articles/<id>.html に埋め込み)
    //   ② URLパス `/articles/<id>.html`
    //   ③ クエリ ?id=<id> (従来のレガシーURL)
    var id = window.__ARTICLE_ID || '';
    if (!id) {
      var m = location.pathname.match(/\/articles\/([^\/]+)\.html$/);
      if (m) id = m[1];
    }
    if (!id) {
      var params = new URLSearchParams(location.search);
      id = decodeURIComponent(params.get('id') || '');
    }

    if (!id) {
      document.getElementById('articleContent').innerHTML =
        '<div class="article-status">記事IDが指定されていません。</div>';
      return;
    }

    try {
      var res = await fetch('/data/articles.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      var articles = data.articles || [];
      var articleIdx = articles.findIndex(function(a) { return a.id === id; });
      var article = articles[articleIdx];

      if (!article) {
        document.getElementById('articleContent').innerHTML =
          '<div class="article-status">記事が見つかりませんでした。</div>';
        return;
      }

      // OGP・タイトル更新
      var pageUrl = location.href;
      var description = (article.summary || '').replace(/\n/g, ' ').slice(0, 120);
      updateOGP(article.title, description, article.image_url || '', pageUrl);

      // パンくずリスト
      renderBreadcrumb(article.category, article.title);

      // ヒーロー画像
      var heroHtml;
      if (article.image_url) {
        heroHtml = '<img id="heroImg" class="article-hero-img" src="' + esc(proxyImg(article.image_url, 1200)) + '" data-orig="' + esc(article.image_url) + '" alt="' + esc(article.title) + '">';
      } else {
        heroHtml = '<div class="article-hero-placeholder">THE WATCHER</div>';
      }

      // ソースサイト名
      var sourceNames = (article.source_names || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      var sourceNamesHtml = sourceNames.length
        ? '<span class="article-meta-sep">·</span><span class="article-source-name">' + esc(sourceNames.join(' / ')) + '</span>'
        : '';

      // 読了時間
      var mins = calcReadTime(article.summary);
      var readTimeHtml = '<span class="article-meta-sep">·</span><span class="article-readtime">読了 ' + mins + '分</span>';

      // via リンク
      var urls  = (article.source_urls  || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      var names = (article.source_names || '').split(',').map(function(s) { return s.trim(); }).filter(Boolean);
      var viaHtml = '';
      if (urls.length) {
        var links = urls.map(function(u, i) {
          var name = names[i] || u;
          return '<a href="' + esc(u) + '" target="_blank" rel="noopener">via ' + esc(name) + ' ↗</a>';
        }).join('');
        viaHtml =
          '<div class="article-source-block">' +
            '<div class="article-source-label">SOURCE</div>' +
            '<div class="article-via-links">' + links + '</div>' +
          '</div>';
      }

      // ハッシュタグ（各タグをtag.htmlへのリンクに）
      var hashtagsHtml = article.hashtags
        ? '<div class="article-hashtags">' + buildHashtagLinks(article.hashtags) + '</div>'
        : '';

      // 本文
      var bodyHtml = article.summary
        ? '<div class="article-text">' + esc(article.summary) + '</div>'
        : '';

      var adSlot = '<div class="ad-slot"><div class="ad-inner"><span>ADVERTISEMENT</span></div></div>';

      document.getElementById('articleContent').innerHTML =
        heroHtml +
        adSlot +
        '<div class="article-wrap">' +
          '<div class="article-meta-row">' +
            '<span class="article-cat">' + esc(article.category) + '</span>' +
            '<span class="article-meta-sep">·</span>' +
            '<span class="article-date">' + fmtDateJa(article.published_at) + '</span>' +
            readTimeHtml +
            sourceNamesHtml +
          '</div>' +
          '<h1 class="article-title">' + esc(article.title) + '</h1>' +
          buildShareButtons(article.title, pageUrl) +
          '<div class="article-divider"></div>' +
          bodyHtml +
          hashtagsHtml +
          viaHtml +
          buildArticleNav(articles, articleIdx) +
        '</div>' +
        adSlot;

      // 画像エラー時フォールバック: ①wsrv.nl失敗 → ②元URL → ③プレースホルダー
      var heroImg = document.getElementById('heroImg');
      if (heroImg) {
        heroImg.onerror = function() {
          var self = this;
          var orig = this.dataset.orig;
          if (this.src !== orig) {
            this.onerror = function() {
              var ph = document.createElement('div');
              ph.className = 'article-hero-placeholder';
              ph.textContent = 'THE WATCHER';
              self.parentNode.replaceChild(ph, self);
            };
            this.src = orig;
          } else {
            var ph = document.createElement('div');
            ph.className = 'article-hero-placeholder';
            ph.textContent = 'THE WATCHER';
            this.parentNode.replaceChild(ph, this);
          }
        };
      }

      // 関連記事
      renderRelated(articles, article.id, article.category);

    } catch(e) {
      console.error(e);
      document.getElementById('articleContent').innerHTML =
        '<div class="article-status">読み込みに失敗しました。<br><a href="./" style="color:#0f1f38;">トップへ戻る</a></div>';
    }
  }

  // 前後記事ナビゲーション HTML を生成
  // articles は新しい順（配列先頭が最新）なので:
  //   前の記事 = idx + 1（古い）、次の記事 = idx - 1（新しい）
  function buildArticleNav(articles, idx) {
    var prev = idx + 1 < articles.length ? articles[idx + 1] : null;
    var next = idx > 0                   ? articles[idx - 1] : null;
    if (!prev && !next) return '';

    var prevHtml = prev
      ? '<a class="article-nav-link nav-prev" href="/articles/' + encodeURIComponent(prev.id) + '.html">' +
          '<div class="article-nav-dir">&#8592; 前の記事</div>' +
          '<div class="article-nav-title">' + esc(prev.title) + '</div>' +
        '</a>'
      : '<div class="article-nav-spacer"></div>';

    var nextHtml = next
      ? '<a class="article-nav-link nav-next" href="/articles/' + encodeURIComponent(next.id) + '.html">' +
          '<div class="article-nav-dir">次の記事 &#8594;</div>' +
          '<div class="article-nav-title">' + esc(next.title) + '</div>' +
        '</a>'
      : '<div class="article-nav-spacer"></div>';

    return '<div class="article-nav">' + prevHtml + nextHtml + '</div>';
  }

  function renderRelated(articles, currentId, currentCategory) {
    var related = articles
      .filter(function(a) { return a.id !== currentId && a.category === currentCategory; })
      .slice(0, 4);

    if (!related.length) return;

    var itemsHtml = related.map(function(a) {
      var img = imgOrPH(
        a.image_url,
        'width:90px;height:60px;object-fit:cover;flex-shrink:0;',
        'news-thumb-placeholder'
      );
      return '<div class="news-item" onclick="openRelated(\'' + esc(a.id) + '\')">' +
        img +
        '<div class="news-content">' +
          '<div class="news-cat">' + esc(a.category) + '</div>' +
          '<div class="news-title">' + esc(a.title) + '</div>' +
          '<div class="news-meta">' + fmtDateJa(a.published_at) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    document.getElementById('relatedSection').innerHTML =
      '<div class="sec-label"><span>RELATED ARTICLES</span></div>' +
      '<div class="related-grid">' + itemsHtml + '</div>';
  }

  document.addEventListener('DOMContentLoaded', init);
</script>

</div>
</body>
</html>
