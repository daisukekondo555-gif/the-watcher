name: THE WATCHER — Auto Update

on:
  schedule:
    # JST 9:17 = UTC 0:17
    - cron: "17 0 * * *"
    # JST 15:23 = UTC 6:23
    - cron: "23 6 * * *"
    # JST 21:41 = UTC 12:41
    - cron: "41 12 * * *"
  workflow_dispatch:

permissions:
  contents: write   # articles.json のコミット・プッシュに必要

jobs:
  update:
    name: Fetch, translate, export & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1: Notion に新着記事を翻訳・保存 ──────────────────────────
      - name: Fetch, translate & save to Notion
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python main.py

      # ── Step 2: 公開記事を articles.json にエクスポート ──────────────────
      - name: Export published articles to JSON
        env:
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python export_notion.py

      # ── Step 3: GA4 アクセスランキングを ranking.json に保存 ─────────────
      - name: Fetch GA4 ranking
        env:
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: python src/ga4_ranking.py

      # ── Step 4: 記事ごとの静的HTML（OGP付き）を articles/ に生成 ─────────
      - name: Pre-render articles with OGP
        run: python src/build_articles.py

      # ── Step 5: articles.json / ranking.json / articles/ をコミット ──────
      # 同時刻に複数ワークフローが走る or 手動コミットが間に入った場合、
      # 単純な push は "rejected (fetch first)" で失敗する。
      # pull --rebase + リトライで競合に耐える実装にする。
      - name: Commit and push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ articles/
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "chore: update articles.json [skip ci]"
          # 最大5回 rebase + push をリトライ
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $i failed, retrying..."
            sleep 3
          done
          echo "push failed after 5 attempts" >&2
          exit 1

      # ── Step 5: Instagram に新着記事をカルーセル投稿 ────────────────────
      - name: Post new articles to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN:        ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: python src/instagram_poster.py
