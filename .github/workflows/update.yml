name: THE WATCHER — Auto Update

on:
  schedule:
    # JST 9:17 = UTC 0:17
    - cron: "17 0 * * *"
    # JST 15:23 = UTC 6:23
    - cron: "23 6 * * *"
    # JST 21:41 = UTC 12:41
    - cron: "41 12 * * *"
  workflow_dispatch:
    inputs:
      skip_rss:
        description: "RSS取得＋Claude翻訳をスキップ（Notion手動編集の即反映用）"
        type: boolean
        default: false

# workflow_dispatch と cron の重なりによる push 競合を予防する。
# cancel-in-progress: false で進行中ジョブを中断せず、次をキュー待ちにする。
concurrency:
  group: update-main
  cancel-in-progress: false

permissions:
  contents: write   # articles.json のコミット・プッシュに必要

jobs:
  update:
    name: Fetch, translate, export & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1: Notion に新着記事を翻訳・保存 ──────────────────────────
      # workflow_dispatch で skip_rss=true が指定されたときはスキップ。
      # Notion上の手動編集を即反映したいユースケース向け。
      - name: Fetch, translate & save to Notion
        if: github.event.inputs.skip_rss != 'true'
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python main.py

      # ── Step 2: 公開記事を articles.json にエクスポート ──────────────────
      - name: Export published articles to JSON
        env:
          NOTION_API_KEY:     ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python export_notion.py

      # ── Step 3: GA4 アクセスランキングを ranking.json に保存 ─────────────
      - name: Fetch GA4 ranking
        env:
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}
        run: python src/ga4_ranking.py

      # ── Step 4: articles.json / ranking.json をリポジトリにコミット ───────
      - name: Commit and push data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update articles.json [skip ci]"
          git push

      # ── Step 5: Instagram に新着記事をカルーセル投稿 ────────────────────
      - name: Post new articles to Instagram
        env:
          INSTAGRAM_ACCESS_TOKEN:        ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
        run: python src/instagram_poster.py
